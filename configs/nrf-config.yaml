benchmarks:
  - name: crc_32
    scale_factor: 6
    iterations: 32
    boards:
    - board_name: nrf52840dk
      supported_environments:
        - name: native
          env:
            RIOT_STACK: 4096

        - name: jerryscript
          env:
            RIOT_STACK: 4096
            HEAP: 16 #kb
            STACK: 4 #kb
            PROFILE: es.next

        - name: lua
          env:
            RIOT_STACK: 4096
            HEAP: 65536

        - name: micropython
          env:
            RIOT_STACK: 4096
            HEAP: 65536

        - name: micro-bpf
          env:
            RIOT_STACK: 4096
            ENABLE_JIT: 0

        - name: wamr
          env:
            RIOT_STACK: 4096
            STACK: 4096

        - name: wamr
          label: wamr-fast
          env:
            INTERPRETER: FAST
            RIOT_STACK: 4096
            STACK: 4096

